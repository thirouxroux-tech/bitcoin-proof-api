<!DOCTYPE html>
<html>

<head>
<title>Create Proof</title>
</head>

<body>

<h1>Create Bitcoin Proof</h1>

<form id="proofForm">

<input type="text" id="message" placeholder="Message">
<button type="submit">Create Proof</button>

</form>

<pre id="result"></pre>

<script>

document.getElementById("proofForm").onsubmit = async function(e){

e.preventDefault()

let message = document.getElementById("message").value

let res = await fetch("/verify",{

method:"POST",

headers:{
"Content-Type":"application/json",
"X-API-KEY":"dev_key_123456"
},

body:JSON.stringify({message})

})

let data = await res.json()

document.getElementById("result").innerText =
JSON.stringify(data,null,2)

}

</script>

</body>

</html>
