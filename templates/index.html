<!DOCTYPE html>
<html>
<head>
<title>BitcoinProof</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:none;
}

button{
background:#f7931a;
color:white;
padding:12px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<h1>BitcoinProof</h1>
<p>Bitcoin timestamp proof engine</p>

<div class="card">

<h2>Create proof</h2>

<textarea id="message" placeholder="Message or document hash"></textarea>

<input id="address" placeholder="Bitcoin address">

<input id="signature" placeholder="Signature (optional)">

<button onclick="verify()">Create Proof</button>

</div>

<div class="card">

<h2>Result</h2>

<pre id="result"></pre>

</div>

</div>

<script>

async function verify(){

let message=document.getElementById("message").value
let address=document.getElementById("address").value
let signature=document.getElementById("signature").value

let response=await fetch("/verify",{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-API-KEY":"dev_key_123456"
},
body:JSON.stringify({
message:message,
address:address,
signature:signature
})
})

let data=await response.json()

document.getElementById("result").innerText=
JSON.stringify(data,null,2)

}

</script>

</body>
</html>
